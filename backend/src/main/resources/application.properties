spring.application.name=basitborsa

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/basitborsa}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:basitborsa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:basitborsa_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Gemini is intentionally NOT configured here.
# Backend never calls Gemini directly; all AI traffic is proxied to the Python AI service
# (see ai.service.* below), and the GEMINI_API_KEY lives only in ai-service's environment.

# Market data
market.data.api.key=${MARKET_DATA_API_KEY:${TWELVE_DATA_API_KEY:}}
market.data.provider=${MARKET_DATA_PROVIDER:twelve-data}
market.data.base-url=${MARKET_DATA_BASE_URL:${TWELVE_DATA_BASE_URL:https://api.twelvedata.com}}
market.data.exchange=${MARKET_DATA_EXCHANGE:BIST}
market.data.cache-stale-hours=${MARKET_DATA_CACHE_STALE_HOURS:18}
# Hackathon MVP scope: only these symbols receive real provider sync / chart-story / news matching.
market.data.active-symbols=${MARKET_DATA_ACTIVE_SYMBOLS:THYAO}
news.active-symbols=${NEWS_ACTIVE_SYMBOLS:THYAO}

# News pipeline
news.enabled=${NEWS_ENABLED:true}
news.sync.enabled=${NEWS_SYNC_ENABLED:true}
news.sync.interval-minutes=${NEWS_SYNC_INTERVAL_MINUTES:10}
# KAP RSS (Public Disclosure Platform). Disabled by default.
news.kap.enabled=${KAP_ENABLED:false}
news.kap.rss-url=${KAP_SOURCE_URL:${NEWS_KAP_RSS_URL:}}
# Generic RSS feeds, semicolon-separated: name|type|url;name|type|url
# type is one of COMPANY | SECTOR | COMMODITY | MACRO | GLOBAL
news.rss.feeds=${NEWS_RSS_FEEDS:}
news.cache-stale-hours=${NEWS_CACHE_STALE_HOURS:6}
news.fetch-timeout-seconds=${NEWS_FETCH_TIMEOUT_SECONDS:10}
news.max-articles-per-feed=${NEWS_MAX_ARTICLES_PER_FEED:50}
news.http.user-agent=${NEWS_HTTP_USER_AGENT:Mozilla/5.0}

# AI Service (Python FastAPI)
ai.service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}
ai.service.internal-api-key=${INTERNAL_AI_API_KEY:local-dev-secret}

# CORS
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}

# Logging
logging.level.com.basitborsa=INFO
logging.level.org.springframework.web=WARN

# Scheduling
spring.task.scheduling.pool.size=2
