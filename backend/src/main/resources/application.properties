spring.application.name=basitborsa

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/basitborsa}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:basitborsa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:basitborsa_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Gemini
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# Market data
market.data.api.key=${MARKET_DATA_API_KEY:}
market.data.provider=fallback

# CORS
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}

# Logging
logging.level.com.basitborsa=INFO
logging.level.org.springframework.web=WARN

# Scheduling
spring.task.scheduling.pool.size=2
