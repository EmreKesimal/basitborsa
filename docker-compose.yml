version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: basitborsa-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-basitborsa}
      POSTGRES_USER: ${POSTGRES_USER:-basitborsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-basitborsa_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-basitborsa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: basitborsa-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-basitborsa}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-basitborsa}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-basitborsa_secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MARKET_DATA_API_KEY: ${MARKET_DATA_API_KEY:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: basitborsa-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
